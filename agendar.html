  <main>
    <h1>Agendamento de Coleta de Materiais Volumosos</h1>
    <p>Solicite a retirada de móveis, eletrodomésticos e outros itens grandes.</p>

    <form id="form-coleta">
      <div class="form-group">
        <label for="item">Tipo de item (ex: sofá, geladeira, entulho): *</label>
        <input type="text" id="item" name="item" required>
      </div>

      <div class="form-group">
        <label for="endereco">Endereço completo para retirada: *</label>
        <textarea id="endereco" name="endereco" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label for="observacoes">Observações:</label>
        <textarea id="observacoes" name="observacoes" rows="3" required></textarea>
      </div>

      <button type="submit">Solicitar Coleta</button>
    </form>
  </main>
