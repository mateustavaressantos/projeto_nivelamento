  <main>
    <h1>Denunciar Foco de Lixo Irregular</h1>
    <p>Preencha os campos abaixo. A localização e pelo menos uma foto são obrigatórios.</p>

    <form id="form-denuncia">
      <div class="form-group">
        <label for="localizacao">Localização (endereço ou ponto de referência): *</label>
        <input type="text" id="localizacao" name="localizacao" required>
      </div>

      <div class="form-group">
        <label for="fotos">Fotos do local: * (mínimo 1)</label>
        <input type="file" id="fotos" name="fotos" accept="image/*" multiple required>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" rows="4" required></textarea>
      </div>

      <button type="submit">Enviar Denúncia</button>
    </form>
  </main>
